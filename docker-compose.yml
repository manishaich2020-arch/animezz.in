services:
  postgres:
    image: postgres:16-alpine
    container_name: otakuvault_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: otakuvault
      POSTGRES_PASSWORD: otakuvault_secret
      POSTGRES_DB: otakuvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otakuvault -d otakuvault"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
